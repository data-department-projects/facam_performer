name: "CI — Intégration Continue"

on:
  push:
    branches: [main, staging, dev]
  pull_request:
    branches: [main, staging, dev]
    types: [opened, synchronize, reopened]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Lint & Vérification TypeScript
  # ────────────────────────────────────────────────────────────
  lint:
    name: "Lint & TypeScript"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installation des dépendances
        run: npm install

      - name: Vérification TypeScript (tsc --noEmit)
        run: npx tsc --noEmit

      - name: ESLint — analyse statique du code
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  # 2. Tests unitaires & couverture de code
  # ────────────────────────────────────────────────────────────
  test:
    name: "Tests & Couverture ≥ 70%"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installation des dépendances
        run: npm install

      - name: Exécution des tests avec couverture
        run: npm run test:coverage

      - name: Upload rapport de couverture (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.sha }}
          path: coverage/
          retention-days: 14

      - name: Envoi vers Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false
          verbose: false

  # ────────────────────────────────────────────────────────────
  # 3. Build Vite — vérification que le build passe
  # ────────────────────────────────────────────────────────────
  build:
    name: "Build Vite"
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installation des dépendances
        run: npm install

      - name: Build de production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload des artifacts de build
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
