name: "CD — Déploiement Continu"

on:
  push:
    branches: [main, staging]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────
  # Guard — vérifie que le CI est passé avant de déployer
  # (les protections de branche GitHub renforcent aussi cela)
  # ────────────────────────────────────────────────────────────

  # ────────────────────────────────────────────────────────────
  # PRODUCTION — main → Vercel (--prod)
  # ────────────────────────────────────────────────────────────
  deploy-production:
    name: "Production — Vercel"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Installer Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull configuration Vercel (Production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel (Production)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Déploiement en production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Production déployée : $URL" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # STAGING — staging → Vercel (preview)
  # ────────────────────────────────────────────────────────────
  deploy-staging:
    name: "Staging — Vercel Preview"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Installer Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull configuration Vercel (Preview)
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel (Staging)
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Déploiement en staging
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview-url=$URL" >> $GITHUB_OUTPUT
          echo "🔁 Staging déployé : $URL" >> $GITHUB_STEP_SUMMARY
